out_dir: results
metric_best: f1
seed: 42
wandb:
  use: False
  project: unifiedGT
dataset:
  dir: data
  format: BTC
  name: full  # Override with feature_set1..feature_set5 to use features.txt.
  reverse_mp: False
  add_ports: False
  task: hetero_edge
  task_type: classification
  task_entity: ('node', 'to', 'node')
  transductive: True
  node_encoder: True
  node_encoder_name: Hetero_Raw
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: Hetero_Raw
  edge_encoder_bn: False
num_threads: 4
num_workers: 0
train:
  mode: custom
  sampler: link_neighbor
  neighbor_sizes: [50, 50]
  iter_per_epoch: 256
  batch_size: 2048
  eval_period: 4
  ckpt_period: 100
  tqdm: True
  persistent_workers: False
  pin_memory: False
val:
  sampler: link_neighbor
  iter_per_epoch: 256
  tqdm: True
model:
  type: HomoGNNEdgeModel
  loss_fun: weighted_cross_entropy
  loss_fun_weight: [1, 1]
  edge_decoding: dot
  graph_pooling: mean
gnn:
  layer_type: GINE
  layers_pre_mp: 0
  layers_mp: 2
  layers_post_mp: 2
  dim_inner: 64
  batch_norm: True
  layer_norm: False
  act: relu
  input_dropout: 0.0
  dropout: 0.0
  agg: mean
optim:
  batch_accumulation: 8
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 0.001
  max_epoch: 500
  scheduler: cosine_with_warmup
  num_warmup_epochs: 5